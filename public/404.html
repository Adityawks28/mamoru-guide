<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — MAMORU GUIDE 守る</title>
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1f3d;
    --text: #e8dcc8;
    --accent: #f5a623;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .error-code {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(4rem, 15vw, 8rem);
    color: var(--accent);
    text-shadow: 4px 4px 0 rgba(0,0,0,0.3);
    margin-bottom: 1rem;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .mascot {
    font-size: 5rem;
    margin-bottom: 1.5rem;
    animation: wobble 2s ease-in-out infinite;
  }
  @keyframes wobble {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-5deg); }
    75% { transform: rotate(5deg); }
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    color: var(--accent);
  }
  .message {
    font-size: 1rem;
    opacity: 0.8;
    margin-bottom: 2rem;
    max-width: 400px;
    line-height: 1.6;
  }
  .home-btn {
    display: inline-block;
    background: var(--accent);
    color: var(--bg);
    padding: 0.75rem 2rem;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    font-size: 1rem;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .home-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(245, 166, 35, 0.3);
  }
  .stars {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: -1;
  }
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="mascot">🛡️</div>
<div class="error-code">404</div>
<h1>Page Not Found</h1>
<p class="message">
  This page doesn't exist — but your safety plan should!<br>
  このページは存在しません<br>
  Halaman tidak ditemukan
</p>
<a href="./" class="home-btn">← Back to MAMORU GUIDE</a>

<script>
// Generate stars
const stars = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + '%';
  star.style.top = Math.random() * 100 + '%';
  star.style.animationDelay = Math.random() * 3 + 's';
  star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
  stars.appendChild(star);
}
</script>

</body>
</html>
